<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <rect x="0" y="0" width="128" height="128" rx="18" ry="18" fill="#0f0f10"/>
  <g clip-path="inset(2px round 16px)">

    <!-- sunset sky bands -->
    <rect x="0" y="0"  width="128" height="12" fill="#2a1a40"/>
    <rect x="0" y="12" width="128" height="6"  fill="#4a2450"/>
    <rect x="0" y="18" width="128" height="6"  fill="#7a2e52"/>
    <rect x="0" y="24" width="128" height="6"  fill="#b85040"/>
    <rect x="0" y="30" width="128" height="6"  fill="#c86050"/>

    <!-- stars -->
    <rect x="18"  y="4"  width="2" height="2" fill="#fff2c8"/>
    <rect x="46"  y="2"  width="1" height="1" fill="#fff2c8"/>
    <rect x="98"  y="6"  width="1" height="1" fill="#fff2c8"/>
    <rect x="114" y="3"  width="2" height="1" fill="#fff2c8"/>

    <!-- distant hills / far paddies -->
    <rect x="0"   y="36" width="128" height="6"  fill="#2a1f38"/>
    <polygon points="0,36 14,28 28,36" fill="#1a1428"/>
    <polygon points="86,36 100,28 116,36" fill="#1a1428"/>
    <polygon points="52,36 60,30 66,36" fill="#1a1428"/>

    <!-- water horizon -->
    <rect x="0" y="42" width="128" height="6"  fill="#283f50"/>
    <rect x="0" y="44" width="128" height="1"  fill="#4a6478"/>
    <rect x="0" y="47" width="128" height="1"  fill="#b8d0d8" opacity="0.5"/>

    <!-- mid paddy (green) -->
    <rect x="0" y="48" width="128" height="6"  fill="#2d3d25"/>
    <rect x="0" y="48" width="128" height="1"  fill="#456b2e"/>

    <!-- foreground dark paddy -->
    <rect x="0" y="54" width="128" height="74" fill="#1c1a12"/>
    <rect x="0" y="54" width="128" height="1"  fill="#3a3828"/>

    <!-- tiny rice stalks on foreground edges -->
    <g fill="#7ea848">
      <rect x="6"   y="58" width="1" height="3"/>
      <rect x="14"  y="60" width="1" height="3"/>
      <rect x="22"  y="58" width="1" height="4"/>
      <rect x="110" y="58" width="1" height="3"/>
      <rect x="118" y="60" width="1" height="3"/>
    </g>
    <g fill="#f4d268">
      <rect x="6"   y="57" width="1" height="1"/>
      <rect x="22"  y="57" width="1" height="1"/>
      <rect x="110" y="57" width="1" height="1"/>
    </g>

    <!-- SPEECH BUBBLE (top-left) -->
    <g shape-rendering="crispEdges">
      <!-- bubble drop shadow -->
      <rect x="10" y="18" width="56" height="20" fill="#2a1a0d"/>
      <!-- bubble body -->
      <rect x="8"  y="16" width="56" height="20" fill="#fefbf0"/>
      <!-- border -->
      <rect x="8"  y="16" width="56" height="2" fill="#2a1a0d"/>
      <rect x="8"  y="34" width="56" height="2" fill="#2a1a0d"/>
      <rect x="8"  y="16" width="2"  height="20" fill="#2a1a0d"/>
      <rect x="62" y="16" width="2"  height="20" fill="#2a1a0d"/>

      <!-- tail pointing down-right toward mascot -->
      <rect x="30" y="36" width="8" height="2" fill="#fefbf0"/>
      <rect x="30" y="36" width="2" height="2" fill="#2a1a0d"/>
      <rect x="36" y="36" width="2" height="2" fill="#2a1a0d"/>
      <rect x="32" y="38" width="4" height="2" fill="#fefbf0"/>
      <rect x="32" y="38" width="2" height="2" fill="#2a1a0d"/>
      <rect x="34" y="38" width="2" height="2" fill="#2a1a0d"/>
      <rect x="33" y="40" width="2" height="2" fill="#2a1a0d"/>

      <!-- glyphs: "$" + caret blocks -->
      <g fill="#2a1a0d">
        <!-- $ -->
        <rect x="18" y="20" width="1" height="12"/>
        <rect x="19" y="20" width="1" height="12"/>
        <rect x="15" y="22" width="4" height="2"/>
        <rect x="14" y="23" width="1" height="2"/>
        <rect x="15" y="25" width="6" height="2"/>
        <rect x="21" y="26" width="1" height="2"/>
        <rect x="15" y="28" width="6" height="2"/>
        <rect x="14" y="28" width="1" height="1"/>
        <!-- caret 1 -->
        <rect x="26" y="20" width="5" height="12"/>
        <!-- caret 2 -->
        <rect x="35" y="20" width="5" height="12" opacity="0.45"/>
        <!-- caret 3 -->
        <rect x="44" y="20" width="5" height="12" opacity="0.2"/>
      </g>
    </g>

    <!-- ======================================================
         MASCOT — big claude-orange pebble, dominates lower half
         ====================================================== -->
    <g shape-rendering="crispEdges">
      <!-- side fin-arms (behind body so body overlaps cleanly) -->
      <rect x="22" y="84"  width="8" height="8" fill="#d97757"/>
      <rect x="18" y="86"  width="4" height="4" fill="#d97757"/>
      <rect x="22" y="100" width="8" height="8" fill="#d97757"/>
      <rect x="18" y="102" width="4" height="4" fill="#d97757"/>

      <rect x="98"  y="84"  width="8" height="8" fill="#d97757"/>
      <rect x="106" y="86"  width="4" height="4" fill="#d97757"/>
      <rect x="98"  y="100" width="8" height="8" fill="#d97757"/>
      <rect x="106" y="102" width="4" height="4" fill="#d97757"/>

      <!-- fin shadow -->
      <rect x="22" y="90"  width="8" height="2" fill="#a85a42"/>
      <rect x="22" y="106" width="8" height="2" fill="#a85a42"/>
      <rect x="98" y="90"  width="8" height="2" fill="#a85a42"/>
      <rect x="98" y="106" width="8" height="2" fill="#a85a42"/>

      <!-- BODY: rounded blob built from 7 stacked rows for pixel-art corners -->
      <rect x="36" y="70"  width="56" height="4"  fill="#d97757"/>
      <rect x="32" y="74"  width="64" height="4"  fill="#d97757"/>
      <rect x="30" y="78"  width="68" height="32" fill="#d97757"/>
      <rect x="32" y="110" width="64" height="4"  fill="#d97757"/>
      <rect x="36" y="114" width="56" height="4"  fill="#d97757"/>

      <!-- top highlight -->
      <rect x="36" y="70"  width="56" height="2"  fill="#e89872"/>
      <rect x="32" y="74"  width="64" height="1"  fill="#e89872"/>

      <!-- bottom shadow -->
      <rect x="32" y="112" width="64" height="2"  fill="#a85a42"/>
      <rect x="36" y="116" width="56" height="2"  fill="#a85a42"/>

      <!-- EYES: tall black bars, wide-set -->
      <rect x="46" y="84" width="8" height="16" fill="#1a0a04"/>
      <rect x="74" y="84" width="8" height="16" fill="#1a0a04"/>

      <!-- eye glint -->
      <rect x="46" y="84" width="2" height="2" fill="#4a3020"/>
      <rect x="74" y="84" width="2" height="2" fill="#4a3020"/>

      <!-- cast shadow on soil -->
      <rect x="30" y="120" width="68" height="3" fill="#0d0a06" opacity="0.55"/>
      <rect x="36" y="123" width="56" height="2" fill="#0d0a06" opacity="0.35"/>
    </g>
  </g>
</svg>
