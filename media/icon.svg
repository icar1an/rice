<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
  <!-- sky gradient: deep night at top → sunset at horizon, matching rice-field.html palette -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1a40"/>
      <stop offset="0.25" stop-color="#4a2450"/>
      <stop offset="0.5" stop-color="#7a2e52"/>
      <stop offset="0.75" stop-color="#b85040"/>
      <stop offset="1" stop-color="#f0a870"/>
    </linearGradient>
  </defs>

  <!-- rounded corner mask so the marketplace square looks polished -->
  <rect x="0" y="0" width="128" height="128" rx="18" ry="18" fill="#0f0f10"/>
  <g clip-path="inset(3px round 15px)">
    <!-- sky -->
    <rect x="3" y="3" width="122" height="60" fill="url(#sky)"/>

    <!-- sun disc + halo -->
    <circle cx="88" cy="46" r="11" fill="#f4b060"/>
    <circle cx="88" cy="46" r="8"  fill="#f8e090"/>

    <!-- mountains silhouette -->
    <polygon points="3,58 20,44 30,54 44,40 60,58" fill="#2a1f38"/>
    <polygon points="60,58 78,46 92,56 110,42 125,58" fill="#1a1428"/>

    <!-- rice field: checkered paddies (top of field = water, then green, then gold) -->
    <!-- water strip -->
    <rect x="3" y="58" width="122" height="8" fill="#395468"/>
    <rect x="3" y="62" width="122" height="1" fill="#b8d0d8"/>

    <!-- rice grid -->
    <g>
      <!-- rows: each 7px tall, 8 cols of 15px, tinted front-to-back -->
      <!-- back row (greener) -->
      <rect x="3"  y="66" width="122" height="7" fill="#456b2e"/>
      <g fill="#5cd868">
        <rect x="11"  y="66" width="6" height="7"/>
        <rect x="41"  y="66" width="6" height="7"/>
        <rect x="71"  y="66" width="6" height="7"/>
        <rect x="101" y="66" width="6" height="7"/>
      </g>

      <rect x="3"  y="73" width="122" height="9" fill="#7ea848"/>
      <g fill="#143614">
        <rect x="3"   y="73" width="122" height="1"/>
      </g>
      <g fill="#a8f4b0">
        <rect x="20" y="75" width="5" height="1"/>
        <rect x="55" y="75" width="5" height="1"/>
        <rect x="92" y="75" width="5" height="1"/>
      </g>

      <!-- mid row (gold ripening) -->
      <rect x="3"  y="82" width="122" height="12" fill="#d4a842"/>
      <g fill="#f4d268">
        <rect x="3"  y="82" width="122" height="2"/>
      </g>
      <g fill="#a07828">
        <rect x="3"  y="93" width="122" height="1"/>
        <rect x="28" y="82" width="1" height="12"/>
        <rect x="64" y="82" width="1" height="12"/>
        <rect x="100" y="82" width="1" height="12"/>
      </g>

      <!-- front row (darker soil + rice stalks) -->
      <rect x="3"  y="94" width="122" height="31" fill="#243820"/>
      <g fill="#456b2e">
        <rect x="3"  y="94" width="122" height="3"/>
      </g>
      <!-- stalks -->
      <g fill="#7ea848">
        <rect x="10"  y="100" width="2" height="10"/>
        <rect x="22"  y="104" width="2" height="8"/>
        <rect x="36"  y="100" width="2" height="12"/>
        <rect x="50"  y="102" width="2" height="10"/>
        <rect x="78"  y="100" width="2" height="12"/>
        <rect x="92"  y="104" width="2" height="8"/>
        <rect x="106" y="100" width="2" height="10"/>
        <rect x="118" y="102" width="2" height="9"/>
      </g>
      <!-- grain tops -->
      <g fill="#f4d268">
        <rect x="9"   y="99"  width="4" height="2"/>
        <rect x="21"  y="103" width="4" height="2"/>
        <rect x="35"  y="99"  width="4" height="2"/>
        <rect x="49"  y="101" width="4" height="2"/>
        <rect x="77"  y="99"  width="4" height="2"/>
        <rect x="91"  y="103" width="4" height="2"/>
        <rect x="105" y="99"  width="4" height="2"/>
        <rect x="117" y="101" width="4" height="2"/>
      </g>
    </g>

    <!-- farmer mascot, centered, Anthropic orange (#d97757) -->
    <g shape-rendering="crispEdges">
      <!-- hat brim -->
      <rect x="54" y="74" width="22" height="3" fill="#8a6020"/>
      <rect x="56" y="77" width="18" height="1" fill="#6a4530"/>
      <!-- hat cone -->
      <rect x="60" y="69" width="10" height="5" fill="#d4a842"/>
      <rect x="62" y="67" width="6"  height="2" fill="#d4a842"/>
      <rect x="64" y="65" width="2"  height="2" fill="#d4a842"/>
      <rect x="60" y="69" width="10" height="1" fill="#a07828"/>
      <!-- head (claude orange) -->
      <rect x="58" y="78" width="14" height="10" fill="#d97757"/>
      <rect x="58" y="78" width="14" height="1"  fill="#a85a42"/>
      <!-- eyes -->
      <rect x="62" y="82" width="2" height="2" fill="#1a0a04"/>
      <rect x="67" y="82" width="2" height="2" fill="#1a0a04"/>
      <!-- body / apron -->
      <rect x="54" y="88" width="22" height="16" fill="#d97757"/>
      <rect x="58" y="90" width="14" height="12" fill="#f8f0e8"/>
      <!-- arms holding a stalk -->
      <rect x="50" y="92" width="4"  height="8" fill="#d97757"/>
      <rect x="76" y="92" width="4"  height="8" fill="#d97757"/>
      <rect x="48" y="88" width="2"  height="6" fill="#7ea848"/>
      <rect x="48" y="85" width="3"  height="3" fill="#f4d268"/>
      <!-- legs -->
      <rect x="56" y="104" width="6" height="10" fill="#243860"/>
      <rect x="66" y="104" width="6" height="10" fill="#243860"/>
      <rect x="56" y="113" width="6" height="2"  fill="#1a0a04"/>
      <rect x="66" y="113" width="6" height="2"  fill="#1a0a04"/>
    </g>

    <!-- a couple of distant birds for character -->
    <g fill="#0e0810">
      <rect x="26" y="30" width="2" height="1"/>
      <rect x="24" y="31" width="2" height="1"/>
      <rect x="28" y="31" width="2" height="1"/>
      <rect x="40" y="24" width="2" height="1"/>
      <rect x="38" y="25" width="2" height="1"/>
      <rect x="42" y="25" width="2" height="1"/>
    </g>
  </g>
</svg>
