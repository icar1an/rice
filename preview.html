<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Rice Field — Live Preview</title>
<style>
  :root { --border-radius-lg: 12px; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #0f0f10; color: #999; font-family: ui-monospace, Menlo, monospace; min-height: 100%; }
  body { padding: 32px 24px 64px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; letter-spacing: 2px; font-size: 11px; text-transform: uppercase; opacity: 0.7; }
  header .step { color: #d97757; }
  iframe { width: 100%; height: 560px; border: 0; display: block; background: #1a1a1a; border-radius: 12px; }
  .note { margin-top: 14px; font-size: 11px; opacity: 0.5; text-align: center; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span>rice field · live preview</span>
    <span class="step" id="step">auto-reload 2s</span>
  </header>
  <iframe id="frame" src="claude_rice_field.html"></iframe>
  <div class="note">press space to pause reload · click frame first</div>
</div>
<script>
  let paused = false;
  const frame = document.getElementById('frame');
  const step = document.getElementById('step');
  setInterval(() => {
    if (paused) return;
    frame.src = 'claude_rice_field.html?t=' + Date.now();
  }, 2000);
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      paused = !paused;
      step.textContent = paused ? 'PAUSED (space to resume)' : 'auto-reload 2s';
      e.preventDefault();
    }
  });
</script>
</body>
</html>
